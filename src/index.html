<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<title>Погода</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
	<link rel="icon" href="favicon.svg" type="image/svg+xml" />
	<link rel="stylesheet" href="css/styles.css" />
</head>

<body class="font-sans antialiased overflow-x-hidden m-0 bg-[#0f1419] text-[#1a1a1a]">
	<main class="relative min-h-screen overflow-hidden">
		<div id="belarus-view"
			class="relative w-full h-screen overflow-hidden bg-gradient-to-b from-[#0f1419] via-[#1a2838] to-[#0f1419]">
			<div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-black/40 pointer-events-none"
				aria-hidden="true"></div>
			<div id="svg-wrap"
				class="absolute inset-0 flex items-center justify-center overflow-hidden cursor-grab active:cursor-grabbing touch-none select-none">
				<div id="svg-transform-wrap" class="w-full h-screen flex items-center justify-center origin-center">
					<svg id="belarus-svg" class="belarus-svg w-full h-full min-h-screen" viewBox="0 0 400 320"
						xmlns="http://www.w3.org/2000/svg">
						<g id="regions"></g>
						<g id="cities-layer"></g>
					</svg>
				</div>
			</div>
			<div id="map-focus-overlay"
				class="absolute inset-0 z-5 bg-black/55 backdrop-blur-sm pointer-events-none opacity-0 transition-opacity duration-300"
				aria-hidden="true"></div>
			<div id="focus-svg-wrap"
				class="absolute inset-0 z-6 pointer-events-none opacity-0 transition-opacity duration-300">
				<div id="focus-transform-wrap" class="w-full h-screen flex items-center justify-center origin-center">
					<svg id="focus-svg" class="w-full h-full min-h-screen" viewBox="0 0 400 320"
						xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
				</div>
			</div>
			<div id="map-loading"
				class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 px-4 py-3 bg-white/95 rounded-xl shadow-2xl z-10 opacity-0 data-[visible=true]:opacity-100 pointer-events-none transition-opacity font-semibold"
				data-visible="false"></div>
			<div id="region-tooltip"
				class="fixed px-4 py-2 bg-gradient-to-br from-[#00b894] to-[#0984e3] text-white text-sm font-semibold rounded-lg shadow-lg pointer-events-none z-50 opacity-0 translate-y-1 data-[visible=true]:opacity-100 data-[visible=true]:translate-y-0 transition-all duration-150 whitespace-nowrap"
				data-visible="false" aria-hidden="true"></div>
			<button id="zoom-reset"
				class="absolute bottom-4 right-4 z-20 hidden items-center gap-2 px-3 py-2 bg-white/90 backdrop-blur-sm text-gray-700 text-xs font-semibold rounded-xl shadow-lg border border-white/50 hover:bg-teal-50 active:scale-95 transition-all"
				aria-label="Сбросить зум">
				<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
					stroke-linecap="round" stroke-linejoin="round">
					<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
					<path d="M3 3v5h5" />
				</svg>
				<span class="hidden sm:inline">Сбросить</span>
			</button>
			<div id="map-hint"
				class="absolute bottom-4 left-1/2 -translate-x-1/2 z-20 px-4 py-2 bg-white/90 backdrop-blur-sm text-gray-600 text-xs font-medium rounded-xl shadow-lg border border-white/30 transition-opacity duration-500 sm:hidden"
				aria-hidden="true">Нажмите на область или город для просмотра погоды</div>
		</div>
	</main>

	<div id="detail-overlay"
		class="fixed inset-0 z-100 opacity-0 invisible transition-all duration-300 pointer-events-none data-[visible=true]:opacity-100 data-[visible=true]:visible data-[visible=true]:pointer-events-auto"
		data-visible="false" aria-hidden="true"></div>
	<aside id="detail-panel" role="dialog" aria-modal="true" aria-label="Погода региона"
		class="fixed top-0 right-0 w-full sm:w-[min(400px,90vw)] max-w-full h-full bg-gradient-to-b from-white to-gray-50 z-[101] shadow-[-8px_0_40px_rgba(0,0,0,0.15)] overflow-y-auto transition-transform duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)] translate-x-full data-[visible=true]:translate-x-0"
		data-visible="false" aria-hidden="true">
		<button
			class="detail-close absolute top-4 right-4 z-10 w-10 h-10 border-0 bg-white/80 backdrop-blur-sm hover:bg-teal-100 hover:text-teal text-2xl leading-none cursor-pointer rounded-xl transition-colors"
			aria-label="Закрыть">×</button>
		<div id="detail-header" class="relative overflow-hidden transition-all duration-500">
			<div id="photo-slider" class="absolute inset-0 hidden">
				<div id="photo-slide"
					class="absolute inset-0 bg-cover bg-center transition-opacity duration-1500 ease-in-out"></div>
				<div id="photo-slide-next"
					class="absolute inset-0 bg-cover bg-center opacity-0 transition-opacity duration-1500 ease-in-out">
				</div>
				<div
					class="absolute inset-0 bg-gradient-to-b from-black/50 via-black/40 to-black/70 pointer-events-none">
				</div>
			</div>
			<div id="detail-header-fallback" class="absolute inset-0 bg-gradient-to-br from-teal to-blue hidden"></div>
			<div class="relative z-1 flex flex-col gap-4 p-6 sm:p-8">
				<h2 id="detail-city"
					class="m-0 text-xl sm:text-2xl font-bold text-teal-500 transition-colors duration-300">—</h2>
				<div class="detail-current flex items-center gap-4 sm:gap-5">
					<div class="detail-icon-wrap shrink-0 w-14 h-14 sm:w-[72px] sm:h-[72px]">
						<img id="detail-icon" class="w-14 h-14 sm:w-[72px] sm:h-[72px] block drop-shadow-lg" src=""
							alt="" />
					</div>
					<div class="flex flex-col gap-1">
						<span id="detail-temp"
							class="text-2xl sm:text-4xl font-bold text-gray-900 transition-colors duration-300">—</span>
						<span id="detail-desc"
							class="text-sm sm:text-base text-gray-500 capitalize transition-colors duration-300">—</span>
					</div>
				</div>
				<div id="detail-extra" class="grid grid-cols-2 gap-2 sm:gap-2.5 text-sm"></div>
			</div>
		</div>
		<div id="city-about" class="hidden px-6 sm:px-8 pt-4 pb-2">
			<p id="city-about-text" class="m-0 text-xs sm:text-sm text-gray-500 leading-relaxed"></p>
		</div>
		<div class="flex flex-col gap-6 p-6 sm:p-8">
			<div id="hourly-chart" class="py-4 hidden" aria-hidden="true"></div>
			<section class="detail-forecast flex flex-col gap-4">
				<h3 id="detail-forecast-title" class="m-0 text-sm sm:text-base font-bold text-gray-700"></h3>
				<div id="forecast-list" class="flex flex-col gap-2"></div>
			</section>
		</div>
	</aside>

	<script src="js/ow-config.js"></script>
	<script src="data/countries.js"></script>
	<script src="js/weather.js"></script>
</body>

</html>
