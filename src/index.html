<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Погода</title>
		<link rel="stylesheet" href="css/decor.css" />
	</head>
	<body>
		<header>
			<span class="header-logo">Беларусь</span>
			<a href="se.html" class="nav-hidden" aria-hidden="true">⋯</a>
		</header>
		<main>
			<div id="belarus-view" class="belarus-view">
				<div id="svg-wrap" class="svg-wrap">
					<div id="svg-transform-wrap" class="svg-transform-wrap">
						<svg id="belarus-svg" class="belarus-svg" viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
							<g id="regions"></g>
						</svg>
					</div>
				</div>
				<div id="map-loading" class="map-loading"></div>
			<div id="region-tooltip" class="region-tooltip" aria-hidden="true"></div>
			</div>
			<aside id="detail-panel" class="detail-panel" aria-hidden="true">
				<button class="detail-close" aria-label="Закрыть">×</button>
				<div class="detail-content">
					<div class="detail-header">
						<h2 class="detail-city">—</h2>
						<div class="detail-current">
							<img class="detail-icon" src="" alt="" />
							<div class="detail-main">
								<span class="detail-temp">—</span>
								<span class="detail-desc">—</span>
							</div>
						</div>
						<div class="detail-extra"></div>
					</div>
					<section class="detail-forecast">
						<h3></h3>
						<div class="forecast-list"></div>
					</section>
				</div>
			</aside>
			<div id="detail-overlay" class="detail-overlay" aria-hidden="true"></div>
		</main>

		<script src="js/ow-config.js"></script>
		<script src="data/countries.js"></script>
		<script src="js/weather.js"></script>
	</body>
</html>
