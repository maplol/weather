<!DOCTYPE html>
<html lang="ru" class="dark">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<title>Погода</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
	<link rel="icon" href="favicon.svg" type="image/svg+xml" />
	<link rel="stylesheet" href="css/styles.css" />
	<script>
		const t = localStorage.getItem("theme");
		if (t === "light" || (!t && window.matchMedia("(prefers-color-scheme: light)").matches))
			document.documentElement.classList.remove("dark");
	</script>
</head>

<body
	class="font-sans antialiased overflow-x-hidden m-0 bg-[#0f1419] dark:bg-[#0f1419] text-[#1a1a1a] dark:text-gray-100 transition-colors duration-500">
	<main class="relative min-h-dvh overflow-hidden">
		<div id="belarus-view"
			class="relative w-full h-dvh overflow-hidden bg-gradient-to-b from-[#e8f0f8] via-[#d0e4f0] to-[#c0d8e8] dark:from-[#0f1419] dark:via-[#1a2838] dark:to-[#0f1419] transition-colors duration-500">
			<div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-white/30 dark:to-black/40 pointer-events-none"
				aria-hidden="true"></div>
			<div id="svg-wrap"
				class="absolute inset-0 flex items-center justify-center overflow-hidden cursor-grab active:cursor-grabbing touch-none select-none">
				<div id="svg-transform-wrap" class="w-full h-dvh flex items-center justify-center origin-center">
					<svg id="belarus-svg" class="belarus-svg w-full h-full min-h-dvh" viewBox="0 0 400 320"
						xmlns="http://www.w3.org/2000/svg">
						<g id="regions"></g>
						<g id="cities-layer"></g>
						<g id="route-line-layer" pointer-events="none"></g>
						<g id="visited-markers" pointer-events="none"></g>
						<g id="home-marker" pointer-events="none"></g>
						<g id="poi-markers"></g>
					</svg>
				</div>
			</div>
			<div id="map-focus-overlay"
				class="absolute inset-0 z-5 bg-black/55 backdrop-blur-sm pointer-events-none opacity-0 transition-opacity duration-300"
				aria-hidden="true"></div>
			<div id="focus-svg-wrap"
				class="absolute inset-0 z-6 pointer-events-none opacity-0 transition-opacity duration-300">
				<div id="focus-transform-wrap" class="w-full h-dvh flex items-center justify-center origin-center">
					<svg id="focus-svg" class="w-full h-full min-h-dvh" viewBox="0 0 400 320"
						xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
				</div>
			</div>
			<div id="map-loading"
				class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 px-4 py-3 bg-white/95 dark:bg-gray-800/95 dark:text-white rounded-xl shadow-2xl z-10 opacity-0 data-[visible=true]:opacity-100 pointer-events-none transition-opacity font-semibold"
				data-visible="false"></div>
			<div id="region-tooltip"
				class="fixed px-4 py-2 bg-gradient-to-br from-[#00b894] to-[#0984e3] text-white text-sm font-semibold rounded-lg shadow-lg pointer-events-none z-50 opacity-0 translate-y-1 data-[visible=true]:opacity-100 data-[visible=true]:translate-y-0 transition-all duration-150 whitespace-nowrap"
				data-visible="false" aria-hidden="true"></div>
			<button id="zoom-reset"
				class="absolute bottom-6 right-4 z-20 hidden items-center gap-2 px-3 py-2 bg-white/90 dark:bg-white/90 backdrop-blur-sm text-gray-700 text-xs font-semibold rounded-xl shadow-lg border border-white/50 hover:bg-teal-50 active:scale-95 transition-all"
				aria-label="Сбросить зум">
				<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
					stroke-linecap="round" stroke-linejoin="round">
					<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
					<path d="M3 3v5h5" />
				</svg>
				<span class="hidden sm:inline">Сбросить</span>
			</button>
			<div id="auth-wrap" class="absolute top-4 left-4 z-[105] flex items-center gap-2 opacity-0 transition-opacity duration-300">
				<button id="auth-btn"
					class="hidden flex items-center gap-2 px-3 py-2 bg-white/90 dark:bg-white/10 backdrop-blur-sm text-gray-700 dark:text-gray-200 text-xs font-semibold rounded-xl shadow-lg border border-white/50 dark:border-white/10 hover:bg-teal-50 dark:hover:bg-white/20 active:scale-95 transition-all"
					aria-label="Войти">
					<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
					<span id="auth-label">Войти</span>
				</button>
				<img id="auth-avatar" class="hidden w-9 h-9 rounded-full border-2 border-white/50 shadow-lg cursor-pointer" alt="avatar" title="Личный кабинет" />
			</div>
			<button id="theme-toggle"
				class="absolute bottom-6 left-4 z-[105] w-10 h-10 flex items-center justify-center bg-white/90 dark:bg-white/10 backdrop-blur-sm text-gray-700 dark:text-gray-200 rounded-xl shadow-lg border border-white/50 dark:border-white/10 hover:bg-teal-50 dark:hover:bg-white/20 active:scale-95 transition-all"
				aria-label="Переключить тему">
				<svg id="theme-icon-sun" class="w-5 h-5 hidden dark:block" viewBox="0 0 24 24" fill="none"
					stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<circle cx="12" cy="12" r="5" />
					<path
						d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
				</svg>
				<svg id="theme-icon-moon" class="w-5 h-5 block dark:hidden" viewBox="0 0 24 24" fill="none"
					stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
				</svg>
			</button>
			<div id="map-hint"
				class="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 px-4 py-2 bg-white/90 dark:bg-white/90 backdrop-blur-sm text-gray-600 text-xs font-medium rounded-xl shadow-lg border border-white/30 transition-opacity duration-500 sm:hidden"
				aria-hidden="true">Нажмите на область или город для просмотра погоды</div>
		</div>
	</main>

	<div id="detail-overlay"
		class="fixed inset-0 z-[100] opacity-0 invisible transition-all duration-300 pointer-events-none data-[visible=true]:opacity-100 data-[visible=true]:visible data-[visible=true]:pointer-events-auto"
		data-visible="false" aria-hidden="true"></div>
	<aside id="detail-panel" role="dialog" aria-modal="true" aria-label="Погода региона"
		class="fixed top-0 right-0 w-full sm:w-[min(400px,90vw)] max-w-full h-full bg-gradient-to-b from-white to-gray-50 dark:from-[#1a2233] dark:to-[#111827] z-[101] shadow-[-8px_0_40px_rgba(0,0,0,0.15)] overflow-y-auto transition-transform duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)] translate-x-full data-[visible=true]:translate-x-0"
		data-visible="false" aria-hidden="true">
		<button
			class="detail-close absolute top-4 right-4 z-10 w-10 h-10 border-0 bg-white/80 dark:bg-white/10 backdrop-blur-sm hover:bg-teal-100 dark:hover:bg-white/20 hover:text-teal text-2xl leading-none cursor-pointer rounded-xl transition-colors dark:text-white"
			aria-label="Закрыть">×</button>
		<div id="detail-header" class="relative overflow-hidden transition-all duration-500">
			<div id="photo-slider" class="absolute inset-0 hidden">
				<div id="photo-slide"
					class="absolute inset-0 bg-cover bg-center transition-opacity duration-1500 ease-in-out"></div>
				<div id="photo-slide-next"
					class="absolute inset-0 bg-cover bg-center opacity-0 transition-opacity duration-1500 ease-in-out">
				</div>
				<div
					class="absolute inset-0 bg-gradient-to-b from-black/50 via-black/40 to-black/70 pointer-events-none">
				</div>
			</div>
			<div id="detail-header-fallback" class="absolute inset-0 bg-gradient-to-br from-teal to-blue hidden"></div>
			<div class="relative z-1 flex flex-col gap-4 p-6 sm:p-8">
				<div class="flex items-center gap-3">
					<h2 id="detail-city"
						class="m-0 text-xl sm:text-2xl font-bold text-teal-500 dark:text-teal-400 transition-colors duration-300 min-w-0">
						—</h2>
					<div id="mini-map-wrap"
						class="hidden shrink-0 w-11 h-11 rounded-lg overflow-hidden bg-[#1a2838]/80 sm:!hidden"
						aria-hidden="true">
						<svg id="mini-map-svg" class="w-full h-full" xmlns="http://www.w3.org/2000/svg"
							preserveAspectRatio="xMidYMid meet"></svg>
					</div>
				</div>
				<div class="detail-current flex items-center gap-4 sm:gap-5">
					<div class="detail-icon-wrap shrink-0 w-[72px] h-[72px]"></div>
					<div class="flex flex-col gap-1">
						<span id="detail-temp"
							class="text-2xl sm:text-4xl font-bold text-gray-900 dark:text-white transition-colors duration-300">—</span>
						<span id="detail-desc"
							class="text-sm sm:text-base text-gray-500 dark:text-gray-400 capitalize transition-colors duration-300">—</span>
					</div>
				</div>
				<div id="detail-extra" class="grid grid-cols-2 gap-2 sm:gap-2.5 text-sm"></div>
			</div>
		</div>
		<div id="detail-tabs" class="hidden px-6 sm:px-8 pt-3 pb-0">
			<div class="flex gap-1 p-0.5 bg-gray-100 dark:bg-white/5 rounded-xl">
				<button data-tab="info" class="detail-tab flex-1 py-2 text-xs font-semibold rounded-lg transition-colors bg-white dark:bg-white/15 text-gray-800 dark:text-white shadow-sm">Места</button>
				<button data-tab="weather" class="detail-tab flex-1 py-2 text-xs font-semibold rounded-lg transition-colors text-gray-400 dark:text-gray-500">Погода</button>
			</div>
		</div>
		<div id="tab-info" class="flex flex-col">
			<div id="city-about" class="hidden px-6 sm:px-8 pt-4 pb-2">
				<p id="city-about-text" class="m-0 text-xs sm:text-sm text-gray-500 dark:text-gray-400 leading-relaxed"></p>
			</div>
			<div id="city-rating" class="hidden px-6 sm:px-8 pb-2">
				<div class="flex items-center gap-2">
					<span id="city-rating-stars" class="text-sm"></span>
					<span id="city-rating-value" class="text-xs font-bold text-amber-500"></span>
				</div>
			</div>
			<div id="city-highlights" class="hidden px-6 sm:px-8 pb-2">
				<div class="flex items-center justify-between gap-3 mb-1.5">
					<h4 class="text-xs font-bold text-gray-600 dark:text-gray-300">Что посетить</h4>
					<div id="city-highlights-filter" class="hidden items-center gap-1 rounded-lg bg-gray-100 dark:bg-white/5 p-0.5">
						<button id="city-highlights-all" class="px-2 py-1 text-[0.65rem] font-semibold rounded-md bg-white dark:bg-white/15 text-gray-700 dark:text-gray-200 shadow-sm transition-colors">Все</button>
						<button id="city-highlights-interest" class="px-2 py-1 text-[0.65rem] font-semibold rounded-md text-gray-400 dark:text-gray-500 transition-colors">По интересам</button>
					</div>
				</div>
				<div id="city-highlights-list" class="flex flex-col gap-1"></div>
			</div>
			<div id="city-tags" class="hidden px-6 sm:px-8 pb-2">
				<div id="city-tags-list" class="flex flex-wrap gap-1"></div>
			</div>
			<div id="visited-section" class="hidden px-6 sm:px-8 pb-2">
				<div class="flex gap-2">
					<button id="visited-btn"
						class="flex-1 flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl text-sm font-semibold transition-all active:scale-[0.97] bg-teal-500 hover:bg-teal-600 text-white shadow-md shadow-teal-500/20">
						<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
						<span>Я тут был</span>
					</button>
					<button id="unvisit-btn"
						class="hidden w-10 h-10 shrink-0 flex items-center justify-center rounded-xl text-sm transition-all active:scale-[0.97] bg-red-50 dark:bg-red-500/10 text-red-400 hover:bg-red-100 dark:hover:bg-red-500/20 border border-red-200/50 dark:border-red-500/20"
						aria-label="Убрать посещение" title="Убрать из посещённых">
						<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
					</button>
				</div>
			</div>
			<div id="secret-fact" class="hidden px-6 sm:px-8 pb-2">
				<div class="flex items-start gap-2 p-3 rounded-xl bg-amber-50 dark:bg-amber-500/10 border border-amber-200/50 dark:border-amber-500/20">
					<svg class="w-4 h-4 shrink-0 mt-0.5 text-amber-500" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
					<p id="secret-fact-text" class="m-0 text-xs text-amber-800 dark:text-amber-300 leading-relaxed"></p>
				</div>
			</div>
		</div>
		<div id="tab-weather" class="hidden flex flex-col gap-6 p-6 sm:p-8">
			<div id="hourly-chart" class="py-4 hidden" aria-hidden="true"></div>
			<section class="detail-forecast flex flex-col gap-4">
				<h3 id="detail-forecast-title"
					class="m-0 text-sm sm:text-base font-bold text-gray-700 dark:text-gray-200"></h3>
				<div id="forecast-list" class="flex flex-col gap-2"></div>
			</section>
		</div>
	</aside>

	<div id="profile-overlay"
		class="fixed inset-0 z-[200] bg-black/40 backdrop-blur-sm opacity-0 invisible transition-all duration-300 pointer-events-none data-[visible=true]:opacity-100 data-[visible=true]:visible data-[visible=true]:pointer-events-auto"
		data-visible="false" aria-hidden="true"></div>
	<aside id="profile-panel"
		class="fixed top-0 left-0 w-full sm:w-[min(420px,90vw)] max-w-full h-full bg-gradient-to-b from-white to-gray-50 dark:from-[#1a2233] dark:to-[#111827] z-[201] shadow-[8px_0_40px_rgba(0,0,0,0.15)] overflow-y-auto transition-transform duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)] -translate-x-full data-[visible=true]:translate-x-0"
		data-visible="false" aria-hidden="true">
		<button id="profile-close"
			class="absolute top-4 right-4 z-10 w-10 h-10 border-0 bg-white/80 dark:bg-white/10 backdrop-blur-sm hover:bg-teal-100 dark:hover:bg-white/20 hover:text-teal text-2xl leading-none cursor-pointer rounded-xl transition-colors dark:text-white"
			aria-label="Закрыть">×</button>
		<div class="p-6 sm:p-8">
			<div id="profile-header" class="flex items-center gap-4 mb-6">
				<img id="profile-photo" class="w-14 h-14 rounded-full border-2 border-teal-500 shadow" alt="" />
				<div class="flex flex-col gap-0.5 min-w-0">
					<span id="profile-name" class="text-lg font-bold text-gray-800 dark:text-white truncate"></span>
					<span id="profile-email" class="text-xs text-gray-400 truncate"></span>
				</div>
			</div>
			<div id="profile-stats" class="grid grid-cols-2 gap-3 mb-6">
				<div class="flex flex-col items-center p-3 rounded-xl bg-teal-50 dark:bg-teal-500/10">
					<span id="stat-visited" class="text-2xl font-bold text-teal-600 dark:text-teal-400">0</span>
					<span class="text-xs text-gray-500 dark:text-gray-400">Посещено</span>
				</div>
				<div class="flex flex-col items-center p-3 rounded-xl bg-blue-50 dark:bg-blue-500/10">
					<span id="stat-total" class="text-2xl font-bold text-blue-600 dark:text-blue-400">36</span>
					<span class="text-xs text-gray-500 dark:text-gray-400">Всего городов</span>
				</div>
			</div>
			<div class="mb-4">
				<h3 class="text-sm font-bold text-gray-700 dark:text-gray-200 mb-3">Посещённые города</h3>
				<div id="profile-visited-list" class="flex flex-col gap-2"></div>
				<p id="profile-empty" class="hidden text-xs text-gray-400 dark:text-gray-500 italic">Вы ещё не отметили ни одного города</p>
			</div>
			<div class="mb-4">
				<h3 class="text-sm font-bold text-gray-700 dark:text-gray-200 mb-3">Мои интересы</h3>
				<div id="profile-interests-grid" class="flex flex-wrap gap-1.5 mb-1"></div>
			</div>
			<div class="mb-4">
				<h3 class="text-sm font-bold text-gray-700 dark:text-gray-200 mb-3">Маршрут путешествия</h3>
				<div id="route-section">
					<div id="route-type-toggle" class="flex rounded-lg overflow-hidden border border-gray-200 dark:border-gray-600 mb-2 text-xs font-semibold">
						<button data-route-type="oneway" class="flex-1 py-1.5 px-2 bg-blue-500 text-white transition-colors">В одну сторону</button>
						<button data-route-type="round" class="flex-1 py-1.5 px-2 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 transition-colors">+ Обратно</button>
					</div>
					<div id="route-buttons" class="flex gap-2">
						<button id="build-route-btn"
							class="flex-1 flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl text-sm font-semibold bg-blue-500 hover:bg-blue-600 text-white shadow-md active:scale-[0.97] transition-all">
							<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 6l6 6-6 6"/></svg>
							<span>Построить маршрут</span>
						</button>
						<button id="cancel-route-btn"
							class="hidden w-10 h-10 shrink-0 flex items-center justify-center rounded-xl bg-red-50 dark:bg-red-500/10 text-red-400 hover:bg-red-100 dark:hover:bg-red-500/20 transition-all active:scale-[0.97]"
							title="Отменить маршрут">
							<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
						</button>
					</div>
					<div id="route-result" class="hidden mt-3"></div>
				</div>
			</div>
			<button id="profile-logout"
				class="w-full flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl text-sm font-semibold bg-red-50 dark:bg-red-500/10 text-red-500 hover:bg-red-100 dark:hover:bg-red-500/20 transition-all active:scale-[0.97]">
				<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
				<span>Выйти</span>
			</button>
		</div>
	</aside>

	<div id="interests-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[300] hidden"></div>
	<div id="interests-modal" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[min(400px,90vw)] bg-white dark:bg-[#1a2233] rounded-2xl shadow-2xl z-[301] p-6 sm:p-8 hidden">
		<h2 class="text-lg font-bold text-gray-800 dark:text-white mb-1">Что вам интересно?</h2>
		<p class="text-xs text-gray-400 dark:text-gray-500 mb-4">Выберите темы, чтобы мы составили идеальный маршрут</p>
		<div id="interests-grid" class="grid grid-cols-2 gap-2 mb-5"></div>
		<button id="interests-save" class="w-full py-2.5 rounded-xl text-sm font-semibold bg-teal-500 hover:bg-teal-600 text-white shadow-md transition-all active:scale-[0.97]">Готово</button>
	</div>

	<div id="hl-modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[400] hidden"></div>
	<div id="hl-modal" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[min(420px,92vw)] max-h-[80dvh] bg-white dark:bg-[#1a2233] rounded-2xl shadow-2xl z-[401] overflow-hidden hidden flex flex-col">
		<div id="hl-modal-photo" class="w-full h-48 bg-gray-200 dark:bg-white/10 bg-cover bg-center relative shrink-0">
			<button id="hl-modal-close" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-black/40 hover:bg-black/60 text-white flex items-center justify-center backdrop-blur-sm transition-colors" aria-label="Закрыть">
				<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
			</button>
		</div>
		<div class="p-5 flex flex-col gap-3 overflow-y-auto">
			<h3 id="hl-modal-name" class="text-base font-bold text-gray-800 dark:text-white leading-snug"></h3>
			<p id="hl-modal-desc" class="text-sm leading-relaxed text-gray-600 dark:text-gray-300"></p>
			<div id="hl-modal-tags" class="flex flex-wrap gap-1.5"></div>
			<p id="hl-modal-city" class="text-xs text-gray-400 dark:text-gray-500"></p>
		</div>
